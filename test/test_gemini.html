<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gemini API 快速测试工具</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f4f7f6;
            color: #333;
            max-width: 600px;
            margin: 40px auto;
            padding: 20px;
        }
        .container {
            background: #fff;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        h2 {
            margin-top: 0;
            color: #1a73e8;
        }
        label {
            font-weight: bold;
            display: block;
            margin-top: 15px;
            margin-bottom: 5px;
        }
        input[type="password"], textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
            box-sizing: border-box;
            font-family: inherit;
        }
        textarea {
            resize: vertical;
        }
        button {
            margin-top: 20px;
            background-color: #1a73e8;
            color: white;
            border: none;
            padding: 12px 20px;
            font-size: 16px;
            border-radius: 5px;
            cursor: pointer;
            width: 100%;
            transition: background 0.3s;
        }
        button:hover {
            background-color: #1557b0;
        }
        button:disabled {
            background-color: #9aa0a6;
            cursor: not-allowed;
        }
        .result-box {
            margin-top: 20px;
            padding: 15px;
            background-color: #f8f9fa;
            border-left: 4px solid #34a853;
            border-radius: 4px;
            min-height: 80px;
            white-space: pre-wrap;
            word-wrap: break-word;
            display: none;
        }
        .error-box {
            border-left-color: #ea4335;
            color: #d93025;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>🧪 Gemini API 测试</h2>
    
    <label for="apiKey">输入你的 Google API Key：</label>
    <input type="password" id="apiKey" placeholder="AIzaSy..." />

    <label for="prompt">输入测试内容：</label>
    <textarea id="prompt" rows="4" placeholder="例如：请用一句话描述AI在科研管理中的应用。">请用一句话描述AI在科研项目管理中的应用。</textarea>

    <button id="sendBtn" onclick="testAPI()">发送请求</button>

    <div id="resultBox" class="result-box"></div>
</div>

<script>
    async function testAPI() {
        const apiKey = document.getElementById('apiKey').value.trim();
        const prompt = document.getElementById('prompt').value.trim();
        const sendBtn = document.getElementById('sendBtn');
        const resultBox = document.getElementById('resultBox');

        // 基础验证
        if (!apiKey) {
            alert("请先输入 API Key！");
            return;
        }
        if (!prompt) {
            alert("请输入测试内容！");
            return;
        }

        // 界面状态：加载中
        sendBtn.disabled = true;
        sendBtn.innerText = "⏳ 正在请求...";
        resultBox.style.display = "block";
        resultBox.className = "result-box";
        resultBox.innerText = "正在等待 Google AI 响应，请稍候...";

        // 使用 gemini-1.5-flash 模型进行快速测试
        //const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`;
        //const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${apiKey}`;
        //const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash-latest:generateContent?key=${apiKey}`;

        // 2024-06-11 更新：gemini-2.5-flash-lite 模型已开放测试，适合国内用户快速验证 API Key 和网络环境
        //const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${apiKey}`;
        const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-lite:generateContent?key=${apiKey}`;

        const payload = {
            contents: [{
                parts: [{ text: prompt }]
            }]
        };

        try {
            const response = await fetch(url, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(payload)
            });

            const data = await response.json();

            if (!response.ok) {
                // 处理 API 返回的错误（比如 Key 无效、网络受限等）
                throw new Error(data.error?.message || `HTTP 错误状态码: ${response.status}`);
            }

            // 提取生成的文本内容
            const aiResponse = data.candidates[0].content.parts[0].text;
            resultBox.innerText = aiResponse;

        } catch (error) {
            // 显示错误信息
            resultBox.className = "result-box error-box";
            resultBox.innerText = `❌ 请求失败：\n${error.message}\n\n排查建议：\n1. 检查 API Key 是否复制完整。\n2. 检查网络环境（国内直连可能会超时或被拦截）。`;
        } finally {
            // 恢复按钮状态
            sendBtn.disabled = false;
            sendBtn.innerText = "发送请求";
        }
    }
</script>

</body>
</html>
